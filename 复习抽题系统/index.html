<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>复习系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Local Review Tool</p>
        <h1>复习系统</h1>
        <p class="hero-text">从 Word 题库转换后的 JSON 中随机抽题，默认排除需要校对的题目。</p>
      </div>
      <div class="status-pill" id="loadStatus">正在加载题库...</div>
    </header>

    <section class="stats-grid" aria-label="题库统计">
      <article class="stat-card">
        <span>总题数</span>
        <strong id="totalCount">0</strong>
      </article>
      <article class="stat-card">
        <span>可用题数</span>
        <strong id="usableCount">0</strong>
      </article>
      <article class="stat-card warning">
        <span>待校对</span>
        <strong id="reviewCount">0</strong>
      </article>
      <article class="stat-card active">
        <span>当前筛选</span>
        <strong id="filteredCount">0</strong>
      </article>
    </section>

    <section class="panel controls" aria-label="筛选条件">
      <div class="field-group">
        <label for="sourceFilter">来源文档</label>
        <select id="sourceFilter">
          <option value="all">全部来源</option>
        </select>
      </div>

      <div class="field-group">
        <label for="typeFilter">题型</label>
        <select id="typeFilter">
          <option value="all">全部题型</option>
        </select>
      </div>

      <label class="check-row">
        <input type="checkbox" id="includeReview">
        <span>包含待校对题</span>
      </label>

      <label class="check-row highlight">
        <input type="checkbox" id="reviewOnly">
        <span>只看待校对题</span>
      </label>
    </section>

    <section class="panel question-panel" aria-live="polite">
      <div class="question-meta" id="questionMeta">请先点击“随机抽题”。</div>
      <div class="review-alert hidden" id="reviewAlert">这道题需要校对，答案或选项可能不完整。</div>
      <h2 id="questionText">尚未抽题</h2>
      <ol class="options-list" id="optionsList"></ol>
      <div class="answer-box hidden" id="answerBox">
        <span>答案</span>
        <p id="answerText"></p>
      </div>
    </section>

    <section class="actions" aria-label="操作按钮">
      <button class="primary" id="randomButton" type="button">随机抽题</button>
      <button id="answerButton" type="button" disabled>显示答案</button>
      <button id="nextButton" type="button" disabled>下一题</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
